name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm 10 は依存の postinstall を無視するため、OGP 生成用ブラウザを明示導入する。
      - name: Install Playwright browser (for OGP export)
        run: pnpm --filter talks exec playwright install --with-deps chromium

      # CI=true なので build.mjs が各デッキの表紙を og.png に書き出し、meta を注入する。
      - name: Build all decks into dist/
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # project-name は Cloudflare Pages のプロジェクト名に合わせる
          command: pages deploy dist --project-name=daitasu-talks --branch=main
